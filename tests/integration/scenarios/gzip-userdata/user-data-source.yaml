disable-services:
  - chrony
  - ssh
command:
  - /bin/sh
  - -c
  - |
    exec >/dev/ttyS0 2>&1
    set -e

    ud="/.easyto/var/lib/user-data"
    [ -f "${ud}" ] || { echo "FAIL: ${ud} not found"; exit 1; }
    grep -q "disable-services" "${ud}" || { echo "FAIL: ${ud} missing expected content"; exit 1; }
    # Verify the file is not raw gzip (first byte should not be 0x1f).
    first=$(dd if="${ud}" bs=1 count=1 2>/dev/null | od -An -tx1 | tr -d ' ')
    [ "${first}" != "1f" ] || { echo "FAIL: ${ud} appears to contain gzip data"; exit 1; }
    echo "user-data written: OK"

    echo "PASS"
